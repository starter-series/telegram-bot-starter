name: Deploy to Railway

on:
  workflow_dispatch:

concurrency:
  group: deploy-railway
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check tag does not exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Run 'npm run version:patch' first."
            exit 1
          fi

      - name: Validate secrets
        env:
          HAS_RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN != '' }}
          HAS_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID != '' }}
        run: |
          MISSING=""
          if [ "$HAS_RAILWAY_TOKEN" != "true" ]; then MISSING="$MISSING RAILWAY_TOKEN"; fi
          if [ "$HAS_SERVICE_ID" != "true" ]; then MISSING="$MISSING RAILWAY_SERVICE_ID"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING — See docs/RAILWAY_DEPLOY.md"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service "$RAILWAY_SERVICE_ID"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
