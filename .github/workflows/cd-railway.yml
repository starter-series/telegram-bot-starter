name: Deploy to Railway

on:
  workflow_dispatch:

concurrency:
  group: deploy-railway
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Run 'npm run version:patch' first."
            exit 1
          fi

      - name: Validate secrets
        env:
          HAS_RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN != '' }}
          HAS_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID != '' }}
        run: |
          MISSING=""
          if [ "$HAS_RAILWAY_TOKEN" != "true" ]; then MISSING="$MISSING RAILWAY_TOKEN"; fi
          if [ "$HAS_SERVICE_ID" != "true" ]; then MISSING="$MISSING RAILWAY_SERVICE_ID"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING — See docs/RAILWAY_DEPLOY.md"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g --ignore-scripts @railway/cli@4.6.3

      - name: Deploy
        run: railway up --service "$RAILWAY_SERVICE_ID"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: sbom.spdx.json
